<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>整治形式主义为基层减负 — 通报数据库</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #f5f7fa; color: #333; }
.container { max-width: 1100px; margin: 0 auto; padding: 20px; }

/* Header */
.header { background: linear-gradient(135deg, #c0392b, #e74c3c); color: #fff; padding: 30px; border-radius: 12px; margin-bottom: 24px; }
.header h1 { font-size: 22px; margin-bottom: 12px; }
.stats { display: flex; gap: 24px; font-size: 14px; opacity: 0.95; }
.stats .num { font-size: 28px; font-weight: bold; display: block; }

/* Search & AI */
.search-row { display: flex; gap: 12px; margin-bottom: 20px; }
.search-row input { flex: 1; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; }
.search-row input:focus { border-color: #e74c3c; }
.search-row button { padding: 12px 24px; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: bold; }
.btn-search { background: #e74c3c; color: #fff; }
.btn-ai { background: #8e44ad; color: #fff; }
.btn-search:hover { background: #c0392b; }
.btn-ai:hover { background: #7d3c98; }

/* AI Result */
.ai-box { background: #f8f0ff; border: 1px solid #d5b3ff; border-radius: 8px; padding: 16px; margin-bottom: 16px; display: none; }
.ai-box .sql { font-family: monospace; font-size: 12px; color: #666; margin: 8px 0; word-break: break-all; }

/* Filters */
.filters { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
.filter-group { background: #fff; border-radius: 8px; padding: 14px; flex: 1; min-width: 280px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.filter-group h3 { font-size: 14px; color: #888; margin-bottom: 10px; }
.filter-group label { display: inline-block; margin: 3px 8px 3px 0; font-size: 13px; cursor: pointer; }
.filter-group input[type=checkbox] { margin-right: 4px; accent-color: #e74c3c; }

/* Notice List */
.notice-list { }
.notice-card { background: #fff; border-radius: 8px; padding: 18px 20px; margin-bottom: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.06); transition: box-shadow .2s; }
.notice-card:hover { box-shadow: 0 3px 12px rgba(0,0,0,.12); }
.notice-date { font-size: 13px; color: #999; }
.notice-title { font-size: 16px; font-weight: bold; margin: 6px 0; color: #c0392b; }
.notice-title a { color: inherit; text-decoration: none; }
.notice-title a:hover { text-decoration: underline; }
.notice-tags { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
.tag { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; }
.tag-level1 { background: #fdecea; color: #c0392b; }
.tag-level2 { background: #e8f4fd; color: #2980b9; }
.tag-province { background: #eafaf1; color: #27ae60; }
.notice-summary { font-size: 14px; color: #666; line-height: 1.6; }

.loading { text-align: center; padding: 40px; color: #999; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>📋 整治形式主义为基层减负 — 通报数据库</h1>
    <div class="stats">
      <div><span class="num" id="totalCount">-</span>篇通报</div>
      <div><span class="num" id="provinceCount">-</span>个省份</div>
      <div><span class="num" id="categoryCount">-</span>个问题分类</div>
    </div>
    <div style="margin-top:16px;">
      <a href="/feedback.html" style="display:inline-block;background:#fff;color:#e74c3c;padding:12px 24px;border-radius:8px;text-decoration:none;font-weight:bold;font-size:15px;box-shadow:0 2px 8px rgba(0,0,0,.15);transition:transform .2s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">📢 情况反映平台 — 点击此处反映增加基层负担的问题</a>
    </div>
  </div>

  <div class="search-row">
    <input type="text" id="searchInput" placeholder="搜索标题、内容..." onkeydown="if(event.key==='Enter')doSearch()">
    <button class="btn-search" onclick="doSearch()">🔍 搜索</button>
    <input type="text" id="aiInput" placeholder="AI智能检索：如 '涉及湖南的通报有哪些'" style="flex:1" onkeydown="if(event.key==='Enter')doAI()">
    <button class="btn-ai" onclick="doAI()">🤖 AI检索</button>
  </div>

  <div class="ai-box" id="aiBox">
    <strong>🤖 AI 检索结果</strong>
    <div class="sql" id="aiSql"></div>
    <div id="aiResults"></div>
  </div>

  <div class="filters">
    <div class="filter-group" id="level1Filter">
      <h3>一级分类（发布机关）</h3>
      <div id="level1Checkboxes"></div>
    </div>
    <div class="filter-group" id="level2Filter">
      <h3>二级分类（问题类型）</h3>
      <div id="level2Checkboxes"></div>
    </div>
  </div>

  <div class="notice-list" id="noticeList">
    <div class="loading">加载中...</div>
  </div>
</div>

<script>
const API = location.origin;

async function fetchAPI(url) {
  const r = await fetch(url);
  return r.json();
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function loadStats() {
  const stats = await fetchAPI(`${API}/api/stats`);
  document.getElementById('totalCount').textContent = stats.total;
  document.getElementById('provinceCount').textContent = stats.provinces;
  document.getElementById('categoryCount').textContent = stats.categories.length;

  // Level 1 checkboxes
  const l1 = document.getElementById('level1Checkboxes');
  l1.innerHTML = stats.level1List.map(v =>
    `<label><input type="checkbox" value="${escapeHtml(v)}" onchange="doSearch()"> ${escapeHtml(v)}</label>`
  ).join('');

  // Level 2 checkboxes
  const l2 = document.getElementById('level2Checkboxes');
  l2.innerHTML = stats.categories.map(v =>
    `<label><input type="checkbox" value="${escapeHtml(v)}" onchange="doSearch()"> ${escapeHtml(v)}</label>`
  ).join('');
}

async function loadNotices(params = {}) {
  const query = new URLSearchParams();
  if (params.search) query.set('search', params.search);
  if (params.level1) params.level1.forEach(v => query.append('level1', v));
  if (params.level2) params.level2.forEach(v => query.append('level2', v));
  if (params.offset) query.set('offset', params.offset);

  const data = await fetchAPI(`${API}/api/notices?${query}`);
  renderNotices(data.results, data.total);
}

function renderNotices(notices, total) {
  const list = document.getElementById('noticeList');
  if (!notices.length) {
    list.innerHTML = '<div class="loading">没有找到匹配的通报</div>';
    return;
  }

  list.innerHTML = `<div style="font-size:13px;color:#999;margin-bottom:12px">共 ${total} 条结果</div>` +
    notices.map(n => `
    <div class="notice-card">
      <div class="notice-date">${n.date || '未知日期'}</div>
      <div class="notice-title"><a href="${escapeHtml(n.url)}" target="_blank">${escapeHtml(n.title)}</a></div>
      <div class="notice-tags">
        ${n.level1 ? `<span class="tag tag-level1">${escapeHtml(n.level1)}</span>` : ''}
        ${(n.level2 || []).map(t => `<span class="tag tag-level2">${escapeHtml(t)}</span>`).join('')}
        ${(n.provinces || []).map(p => `<span class="tag tag-province">${escapeHtml(p)}</span>`).join('')}
      </div>
      <div class="notice-summary">${escapeHtml(n.summary || '')}</div>
    </div>
  `).join('');
}

async function doSearch() {
  document.getElementById('aiBox').style.display = 'none';
  const search = document.getElementById('searchInput').value.trim();
  const level1 = [...document.querySelectorAll('#level1Checkboxes input:checked')].map(c => c.value);
  const level2 = [...document.querySelectorAll('#level2Checkboxes input:checked')].map(c => c.value);

  await loadNotices({ search, level1: level1.length ? level1 : null, level2: level2.length ? level2 : null });
}

async function doAI() {
  const q = document.getElementById('aiInput').value.trim();
  if (!q) return;

  const box = document.getElementById('aiBox');
  box.style.display = 'block';
  document.getElementById('aiSql').textContent = '正在思考...';
  document.getElementById('aiResults').innerHTML = '';

  const data = await fetchAPI(`${API}/api/ai?q=${encodeURIComponent(q)}`);
  document.getElementById('aiSql').textContent = data.sql || '';

  if (data.results && data.results.length) {
    renderNotices(data.results, data.count);
  } else {
    document.getElementById('aiResults').innerHTML = '<div style="padding:20px;color:#999">未找到匹配结果</div>';
  }
}

// Init
loadStats().then(() => loadNotices());
</script>
</body>
</html>
